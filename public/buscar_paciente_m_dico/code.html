<script src="../js/mobile-utils.js"></script>
<script>
    const searchInput = document.getElementById('patient-search');
    const noResults = document.getElementById('no-results');
    const grid = document.getElementById('patients-grid');
    const STORAGE_KEY = 'odontonilPatients';

    function getPatients() {
        try {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                return JSON.parse(stored);
            }
        } catch (error) {
            console.error('Erro ao ler pacientes salvos.', error);
        }
        return [];
    }

    function getInitials(name) {
        if (!name) return 'P';
        return name
            .split(' ')
            .filter(Boolean)
            .slice(0, 2)
            .map((part) => part[0])
            .join('')
            .toUpperCase();
    }

    function renderPatients() {
        const patients = getPatients();
        
        if (patients.length === 0) {
            grid.innerHTML = '<p class="col-span-full text-center text-secondary py-10 font-bold">Nenhum paciente cadastrado via tela de recepção.</p>';
            return;
        }
        
        grid.innerHTML = patients.map(patient => {
            const displayId = patient.id ? patient.id.split('-')[0].substring(0, 5).toUpperCase() : '00000';
            
            return `
            <div class="patient-card bg-surface-container-lowest rounded-[2rem] p-6 flex flex-col justify-between group cursor-pointer hover:shadow-xl hover:translate-y-[-4px] transition-all duration-300 border border-outline-variant/10">
                <div class="flex items-start gap-4 mb-6">
                    ${patient.photo
                        ? `<img alt="${patient.name}" class="h-14 w-14 rounded-full object-cover shadow-sm border border-outline-variant/20" src="${patient.photo}"/>`
                        : `<div class="h-14 w-14 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container font-headline font-bold text-xl">${getInitials(patient.name)}</div>`
                    }
                    <div class="flex-1 min-w-0">
                        <h3 class="text-on-surface font-bold text-lg truncate">${patient.name}</h3>
                        <p class="text-secondary text-sm font-body">ID: #${displayId}</p>
                        <p class="text-primary/60 text-xs font-medium mt-1">Cadastro do paciente • Cadastro ativo</p>
                    </div>
                </div>
                <a href="../prescri_o_do_paciente_odontonil/code.html?patient=${encodeURIComponent(patient.id)}" class="w-full bg-primary text-white text-center py-3 rounded-2xl text-sm font-bold tracking-wide transition-all active:scale-95 shadow-lg shadow-primary/20">
                    Ver Prontuário
                </a>
            </div>
            `;
        }).join('');
    }

    function filterPatients() {
        const query = searchInput.value.trim().toLowerCase();
        let visibleCount = 0;
        const patientCards = Array.from(document.querySelectorAll('.patient-card'));

        patientCards.forEach((card) => {
            const cardText = card.textContent.toLowerCase();
            const matches = query === '' || cardText.includes(query);

            card.classList.toggle('hidden', !matches);

            if (matches) {
                visibleCount += 1;
            }
        });

        noResults.classList.toggle('hidden', visibleCount !== 0);
    }

    // Inicialização
    document.addEventListener('DOMContentLoaded', () => {
        renderPatients();
        searchInput.addEventListener('input', filterPatients);
    });
</script>
