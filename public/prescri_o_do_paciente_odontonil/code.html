<script>
    document.addEventListener('DOMContentLoaded', async () => {
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-24 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full text-white font-medium z-50 transition-all duration-300 ${
                type === 'error' ? 'bg-red-500' : 'bg-green-500'
            }`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        async function loadProntuario(patientId) {
            const response = await fetch(`/api/prontuarios/${encodeURIComponent(patientId)}`);
            if (!response.ok) {
                throw new Error('Falha ao carregar prontuário.');
            }
            return response.json();
        }

        async function saveProntuario(patientId, notes) {
            const response = await fetch(`/api/prontuarios/${encodeURIComponent(patientId)}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ notes }),
            });

            if (!response.ok) {
                throw new Error('Falha ao salvar prontuário.');
            }

            return response.json();
        }

        subscribeToPacientesRealtime({ reload: true });

        const dateDisplay = document.getElementById('current-date-display');
        if (dateDisplay) {
            const now = new Date();
            const formatter = new Intl.DateTimeFormat('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
            const formattedParts = formatter.formatToParts(now);

            let day = formattedParts.find((part) => part.type === 'day')?.value || '';
            let month = formattedParts.find((part) => part.type === 'month')?.value || '';
            let year = formattedParts.find((part) => part.type === 'year')?.value || '';

            month = month.replace(/\./g, '');
            if (month.length > 0) {
                month = month.charAt(0).toUpperCase() + month.slice(1);
            }

            dateDisplay.textContent = `${day} ${month} ${year}`.trim();
        }

        const urlParams = new URLSearchParams(window.location.search);
        const patientId = urlParams.get('patient');

        const elName = document.getElementById('patient-name');
        const elId = document.getElementById('patient-id');
        const elAddress = document.getElementById('patient-address');
        const notesInput = document.getElementById('patient-notes');
        const saveButton = document.getElementById('save-prontuario-button');

        if (patientId) {
            const patients = await getPacientes();
            const patient = patients.find((item) => item.id === patientId);

            if (patient) {
                if (elName) {
                    elName.textContent = patient.name || 'Paciente Sem Nome';
                }
                if (elId) {
                    elId.textContent = `ID: ${formatPatientId(patient.id)}`;
                }

                const elPhoto = document.getElementById('patient-photo-container');
                if (elPhoto) {
                    if (patient.photo) {
                        elPhoto.innerHTML = `<img alt="${patient.name}" src="${patient.photo}" class="h-full w-full object-cover" />`;
                    } else {
                        const initials = patient.name
                            ? patient.name.split(' ').filter(Boolean).slice(0, 2).map((part) => part[0]).join('').toUpperCase()
                            : 'P';
                        elPhoto.innerHTML = initials;
                    }
                }

                let fullAddress = 'Endereço não informado';
                if (patient.endereco) {
                    fullAddress = patient.endereco;
                    if (patient.numero) fullAddress += `, ${patient.numero}`;
                    if (patient.complemento) fullAddress += ` - ${patient.complemento}`;
                    if (patient.bairro) fullAddress += ` - ${patient.bairro}`;
                    if (patient.cidade && patient.uf) {
                        fullAddress += `, ${patient.cidade} - ${patient.uf}`;
                    } else if (patient.cidade) {
                        fullAddress += `, ${patient.cidade}`;
                    }
                    if (patient.cep) fullAddress += ` (${patient.cep})`;
                }

                if (elAddress) {
                    elAddress.textContent = fullAddress;
                }
            } else {
                if (elName) elName.textContent = 'Paciente Não Encontrado';
                if (elAddress) elAddress.textContent = 'Dados não disponíveis';
            }

            try {
                const prontuario = await loadProntuario(patientId);
                notesInput.value = prontuario.notes || '';
            } catch (error) {
                console.error('Erro ao carregar prontuário:', error);
                showToast('Não foi possível carregar o prontuário salvo.', 'error');
            }
        }

        saveButton.addEventListener('click', async () => {
            if (!patientId) {
                showToast('Paciente não identificado para salvar o prontuário.', 'error');
                return;
            }

            saveButton.disabled = true;
            showToast('Salvando prontuário...', 'success');

            try {
                await saveProntuario(patientId, notesInput.value);
                showToast('Prontuário salvo com sucesso!', 'success');
                setTimeout(() => {
                    window.location.href = '../buscar_paciente_m_dico/code.html';
                }, 700);
            } catch (error) {
                console.error('Erro ao salvar prontuário:', error);
                showToast('Não foi possível salvar o prontuário.', 'error');
            } finally {
                saveButton.disabled = false;
            }
        });
    });
</script>
